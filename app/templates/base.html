<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LangLearn Studio</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=PT+Serif:wght@400;600&display=swap"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <h1>LangLearn Studio</h1>
          <p>Blend your experience with AI prompts, memory recall, and writing polish.</p>
        </div>
        <nav class="hero-nav">
          {% if session.get('user_id') %}
          <span class="hero-user">{{ session.get('username') }}</span>
          <a href="{{ url_for('main.logout') }}">Log out</a>
          {% else %}
          <a href="{{ url_for('main.login') }}">Log in</a>
          <a class="pill" href="{{ url_for('main.register') }}">Sign up</a>
          {% endif %}
        </nav>
      </header>
      <main class="content-shell">{% block content %}{% endblock %}</main>
    </div>
    <script src="{{ url_for('static', filename='js/chat.js') }}" defer></script>
  </body>
</html>

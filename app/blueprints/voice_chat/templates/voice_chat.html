{% extends "base.html" %}

{% block content %}
  <section class="chat-shell card">
    <header class="chat-header">
      <div>
        <h2>Lessons chat</h2>
        <p>Ask for review, explanations, corrections, evaluations, or fresh activities.</p>
      </div>
      <div class="lesson-selector">
        <label for="lesson-select">Choose a lesson</label>
        <select id="lesson-select" name="lesson_id">
          {% if lessons %}
          {% for lesson in lessons %}
          <option
            value="{{ lesson.id }}"
            data-description="{{ lesson.description|default('No description yet.') }}"
            {% if selected_lesson and lesson.id == selected_lesson.id %}selected{% endif %}
          >
            {{ lesson.title }} · {{ lesson.language }}
          </option>
          {% endfor %}
          {% else %}
          <option disabled selected>Start by creating a lesson record.</option>
          {% endif %}
        </select>
      </div>

      <div class="voice-controls" style="margin-top: 1rem;">
      <button id="recordButton" class="btn btn-primary">🎤 Iniciar Grabación</button>
      <span id="recordingStatus" style="display: none; color: red; margin-left: 10px;">🔴 Grabando...</span>
    </div>
    </header>
    <script>
      const processAudioUrl = "{{ url_for('voice_chat.process_audio') }}";
    </script>
    <script src="{{ url_for('voice_chat.static', filename='js/script.js') }}" defer></script>
  </section>
{% endblock %}
